services:
  codex-n8n-bridge:
    image: ghcr.io/stanshchukin/codex-n8n-bridge:latest
    container_name: codex-n8n-bridge
    restart: unless-stopped
    environment:
      CODEX_BRIDGE_TOKEN: codex-local-test
      CODEX_BRIDGE_CWD: /workspace
      CODEX_BRIDGE_HOST: 0.0.0.0
      CODEX_BRIDGE_PORT: 8787
      CODEX_BRIDGE_TIMEOUT_MS: 600000
      CODEX_BRIDGE_DISABLE_MCP: "1"
    ports:
      - "8787:8787"
    volumes:
      - ../../:/workspace
      - codex-n8n-bridge:/root/.codex
    working_dir: /workspace

volumes:
  codex-n8n-bridge:
    name: codex-n8n-bridge
